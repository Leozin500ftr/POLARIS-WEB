<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polaris - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #f0f4ff;
    --panel-bg: #ffffff;
    --text: #0f172a;
    --text-sub: #64748b;
    --input-bg: #f8fafc;
    --input-border: #e2e8f0;
    --input-focus: #3b6cf7;
    --btn-primary: #3b6cf7;
    --btn-primary-hover: #2f5ce0;
    --btn-secondary-bg: #eef2ff;
    --btn-secondary-color: #3b6cf7;
    --accent: #34d399;
    --left-bg: #0f172a;
    --card-shadow: 0 24px 64px rgba(59,108,247,0.12);
    --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

body.dark {
    --bg: #07090f;
    --panel-bg: #0f1623;
    --text: #f1f5f9;
    --text-sub: #64748b;
    --input-bg: #1a2236;
    --input-border: #1e2d47;
    --btn-secondary-bg: #1a2236;
    --btn-secondary-color: #60a5fa;
    --card-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

/* ── LAYOUT WRAPPER ── */
.login-wrapper {
    display: flex;
    width: 920px;
    max-width: 96vw;
    min-height: 560px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    position: relative;
}

/* ── PAINEL ESQUERDO ── */
.left-panel {
    width: 380px;
    flex-shrink: 0;
    background: var(--left-bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 44px 40px;
}

body.dark .left-panel { background: #060b14; }

/* Canvas de partículas */
#particles {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.left-content {
    position: relative;
    z-index: 1;
}

.left-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 56px;
}

/* Hexágono SVG animado */
.hex-mark {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
    animation: hexSpin 12s linear infinite;
}

@keyframes hexSpin {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.08); }
}

.left-logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #ffffff;
    text-transform: uppercase;
}

.left-logo-sub {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-top: 1px;
}

.left-headline {
    font-family: 'Syne', sans-serif;
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.18;
    margin-bottom: 16px;
}

.left-headline span {
    background: linear-gradient(90deg, #3b6cf7, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.left-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    line-height: 1.7;
    max-width: 260px;
}

.left-bottom {
    position: relative;
    z-index: 1;
}

.left-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    transition: var(--transition);
}

.tag:hover {
    border-color: #34d399;
    color: #34d399;
}

/* ── PAINEL DIREITO ── */
.right-panel {
    flex: 1;
    background: var(--panel-bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 48px;
    transition: var(--transition);
    position: relative;
}

/* Botão dark mode */
.toggle-dark {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--input-border);
    border-radius: 50%;
    background: var(--input-bg);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    z-index: 10;
}

.toggle-dark:hover {
    border-color: var(--btn-primary);
    transform: rotate(20deg);
}

.form-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--btn-primary);
    margin-bottom: 10px;
}

body.dark .form-eyebrow { color: #60a5fa; }

.form-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
}

.form-subtitle {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 36px;
}

/* Campos */
.field {
    margin-bottom: 16px;
    position: relative;
}

.field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 7px;
}

.field-inner {
    position: relative;
    display: flex;
    align-items: center;
}

.field-icon {
    position: absolute;
    left: 14px;
    font-size: 15px;
    opacity: 0.45;
    pointer-events: none;
}

.field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: var(--transition);
}

.field input:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 4px rgba(59,108,247,0.1);
    background: var(--panel-bg);
}

body.dark .field input {
    color: #f1f5f9;
}

.field input::placeholder { color: #94a3b8; }

/* Botões */
.btn-login {
    width: 100%;
    padding: 14px;
    background: var(--btn-primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    margin-bottom: 12px;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}

.btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
}

.btn-login:hover { background: var(--btn-primary-hover); transform: translateY(-1px); }
.btn-login:hover::after { transform: translateX(100%); }
.btn-login:active { transform: translateY(0); }

.btn-register {
    width: 100%;
    padding: 13px;
    background: var(--btn-secondary-bg);
    color: var(--btn-secondary-color);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
}

.btn-register:hover {
    border-color: var(--btn-primary);
    background: rgba(59,108,247,0.07);
}

body.dark .btn-register { color: #60a5fa; }

/* Divisor */
.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--input-border);
}

.divider span {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    right: -400px;
    background: #1e293b;
    color: white;
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    transition: right 0.45s cubic-bezier(0.4,0,0.2,1);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 320px;
    border-left: 3px solid #34d399;
}

.toast.error { border-left-color: #f87171; }
.toast.show { right: 20px; }

/* ── RESPONSIVO ── */
@media (max-width: 700px) {
    .left-panel { display: none; }
    .right-panel { padding: 40px 28px; border-radius: 24px; }
    .login-wrapper { border-radius: 24px; }
}

/* Animações de entrada */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.form-eyebrow  { animation: fadeUp 0.5s ease 0.1s both; }
.form-title    { animation: fadeUp 0.5s ease 0.18s both; }
.form-subtitle { animation: fadeUp 0.5s ease 0.24s both; }
.field:nth-child(1) { animation: fadeUp 0.5s ease 0.32s both; }
.field:nth-child(2) { animation: fadeUp 0.5s ease 0.38s both; }
.btn-login     { animation: fadeUp 0.5s ease 0.44s both; }
.divider       { animation: fadeUp 0.5s ease 0.48s both; }
.btn-register  { animation: fadeUp 0.5s ease 0.52s both; }
</style>
</head>

<body>

<div class="login-wrapper">

    <!-- ── PAINEL ESQUERDO ── -->
    <div class="left-panel">
        <canvas id="particles"></canvas>

        <div class="left-content">
            <div class="left-logo">
                <svg class="hex-mark" viewBox="0 0 46 46" fill="none">
                    <polygon points="23,2 42,12 42,34 23,44 4,34 4,12"
                        stroke="url(#hg)" stroke-width="2" fill="none"/>
                    <polygon points="23,8 37,15.5 37,30.5 23,38 9,30.5 9,15.5"
                        stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
                    <text x="23" y="28" text-anchor="middle"
                        font-family="Syne,sans-serif" font-size="14"
                        font-weight="800" fill="url(#hg2)">P</text>
                    <defs>
                        <linearGradient id="hg" x1="0" y1="0" x2="46" y2="46" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#3b6cf7"/>
                            <stop offset="100%" stop-color="#34d399"/>
                        </linearGradient>
                        <linearGradient id="hg2" x1="0" y1="0" x2="46" y2="46" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#3b6cf7"/>
                            <stop offset="100%" stop-color="#34d399"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div>
                    <div class="left-logo-text">Polaris</div>
                    <div class="left-logo-sub">Softwares</div>
                </div>
            </div>

            <h2 class="left-headline">Gestão<br>inteligente<br><span>ao seu alcance</span></h2>
            <p class="left-desc">Controle clientes, produtos, pedidos e serviços em um único lugar — rápido, simples e seguro.</p>
        </div>

        <div class="left-bottom">
            <div class="left-tags">
                <span class="tag">Clientes</span>
                <span class="tag">Produtos</span>
                <span class="tag">Pedidos</span>
                <span class="tag">Serviços</span>
            </div>
        </div>
    </div>

    <!-- ── PAINEL DIREITO ── -->
    <div class="right-panel">
        <button class="toggle-dark" id="btnDark" onclick="alternarModo()">🌙</button>

        <p class="form-eyebrow">Bem-vindo de volta</p>
        <h1 class="form-title">Entrar na conta</h1>
        <p class="form-subtitle">Digite suas credenciais para acessar o painel.</p>

        <div class="field">
            <label>Usuário</label>
            <div class="field-inner">
                <span class="field-icon">👤</span>
                <input type="text" id="usuario" placeholder="Seu usuário">
            </div>
        </div>

        <div class="field">
            <label>Senha</label>
            <div class="field-inner">
                <span class="field-icon">🔒</span>
                <input type="password" id="senha" placeholder="Sua senha" onkeydown="if(event.key==='Enter') login()">
            </div>
        </div>

        <button class="btn-login" onclick="login()">Entrar →</button>

        <div class="divider"><span>ou</span></div>

        <button class="btn-register" onclick="window.location.href='cadastro.html'">
            Criar nova conta
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── PARTÍCULAS ── */
(function(){
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, dots;

    function resize(){
        W = canvas.width  = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
    }

    function mkDot(){
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.4,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            a: Math.random()
        };
    }

    function init(){
        resize();
        dots = Array.from({length: 60}, mkDot);
    }

    function draw(){
        ctx.clearRect(0, 0, W, H);

        // Linhas entre pontos próximos
        for(let i = 0; i < dots.length; i++){
            for(let j = i+1; j < dots.length; j++){
                const dx = dots[i].x - dots[j].x;
                const dy = dots[i].y - dots[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 90){
                    ctx.beginPath();
                    ctx.moveTo(dots[i].x, dots[i].y);
                    ctx.lineTo(dots[j].x, dots[j].y);
                    ctx.strokeStyle = `rgba(59,108,247,${0.15 * (1 - dist/90)})`;
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }
            }
        }

        dots.forEach(d => {
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(52,211,153,${d.a * 0.7})`;
            ctx.fill();

            d.x += d.vx; d.y += d.vy;
            if(d.x < 0 || d.x > W) d.vx *= -1;
            if(d.y < 0 || d.y > H) d.vy *= -1;
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
})();

/* ── LOGIN ── */
function login(){
    let usuario = document.getElementById("usuario").value.trim().toLowerCase();
    let senha   = document.getElementById("senha").value;
    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
    let encontrado = usuarios.find(u => u.usuario === usuario);

    if(!encontrado){ mostrarToast("⚠️", "Usuário não cadastrado!", true); return; }
    if(encontrado.senha !== senha){ mostrarToast("⚠️", "Senha incorreta!", true); return; }

    mostrarToast("✅", "Login realizado com sucesso!");
    localStorage.setItem("usuarioLogado", usuario);
    setTimeout(() => { window.location.href = "home.html"; }, 1000);
}

/* ── TOAST ── */
function mostrarToast(icon, mensagem, erro=false){
    let toast = document.getElementById("toast");
    toast.innerHTML = `<span>${icon}</span><span>${mensagem}</span>`;
    toast.classList.remove("error", "show");
    if(erro) toast.classList.add("error");
    void toast.offsetWidth;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

/* ── DARK MODE ── */
function alternarModo(){
    document.body.classList.toggle("dark");
    let btn = document.getElementById("btnDark");
    if(document.body.classList.contains("dark")){
        localStorage.setItem("modo","dark");
        btn.innerHTML = "☀";
    } else {
        localStorage.setItem("modo","light");
        btn.innerHTML = "🌙";
    }
}

/* ── INIT ── */
window.onload = function(){
    let btn = document.getElementById("btnDark");
    if(localStorage.getItem("modo") === "dark"){
        document.body.classList.add("dark");
        btn.innerHTML = "☀";
    } else {
        btn.innerHTML = "🌙";
    }

    if(localStorage.getItem("usuarioCriado") === "true"){
        mostrarToast("✅", "Usuário cadastrado com sucesso!");
        localStorage.removeItem("usuarioCriado");
    }

    if(localStorage.getItem("trocarPara")){
        document.getElementById("usuario").value = localStorage.getItem("trocarPara");
        localStorage.removeItem("trocarPara");
        mostrarToast("💡", "Digite a senha para entrar como este usuário.");
    }

    if(localStorage.getItem("usuarioLogado")){
        window.location.href = "home.html";
    }
}
</script>
</body>
</html>
